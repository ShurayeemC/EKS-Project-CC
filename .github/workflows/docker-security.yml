name: Docker Security

on:
  push:
    branches:
      - main

jobs:
  checkov-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Checkov
        run: pip3 install checkov

      - name: Scan IaC code
        run: |
          checkov -d infrastructure \
            --skip-check CKV_AWS_37,CKV_AWS_58,CKV_AWS_39,CKV_AWS_38,CKV_AWS_355,CKV_AWS_23,CKV2_AWS_5,CKV2_AWS_38,CKV2_AWS_11,CKV2_AWS_12,CKV2_AWS_39

  docker-build-scan-push:
    runs-on: ubuntu-latest
    needs: checkov-scan
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: sc-eks-ecr
          IMAGE_TAG: ${{ github.sha }}
        run: docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./app

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Trivy scan
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: sc-eks-ecr
          IMAGE_TAG: ${{ github.sha }}
        run: trivy image --exit-code 0 --severity CRITICAL --ignore-unfixed $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: sc-eks-ecr
          IMAGE_TAG: ${{ github.sha }}
        run: docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update image tag in deployment
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: sc-eks-ecr
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|image:.*|image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" k8s/deployment.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add k8s/deployment.yaml
          git commit -m "ci: update image tag to $IMAGE_TAG"
          git push